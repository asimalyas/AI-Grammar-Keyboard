name: Build Android APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Create local.properties from secrets
        shell: bash
        run: |
          AI_PROVIDER_VALUE="${{ secrets.AI_PROVIDER }}"
          if [ -z "$AI_PROVIDER_VALUE" ]; then
            AI_PROVIDER_VALUE="groq"
          fi

          {
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}"
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"
            echo "AI_PROVIDER=$AI_PROVIDER_VALUE"
          } > local.properties

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-grammar-keyboard-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk